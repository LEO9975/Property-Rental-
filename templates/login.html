<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Property Rental System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed
    );
}

.container{

    width:900px;

    background:rgba(
        255,
        255,
        255,
        0.15
    );

    backdrop-filter:blur(15px);

    border-radius:20px;

    padding:30px;

    display:flex;

    gap:30px;

    box-shadow:
    0 8px 32px
    rgba(0,0,0,0.2);
}

.card{

    flex:1;

    background:white;

    border-radius:15px;

    padding:25px;
}

h2{

    text-align:center;

    margin-bottom:20px;

    color:#4f46e5;
}

input,
select{

    width:100%;

    padding:12px;

    margin-bottom:15px;

    border:1px solid #ddd;

    border-radius:8px;
}

button{

    width:100%;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#4f46e5;

    color:white;

    font-size:16px;

    cursor:pointer;
}

button:hover{

    background:#4338ca;
}

.logo{

    text-align:center;

    color:white;

    margin-bottom:20px;

    font-size:30px;

    font-weight:bold;
}

</style>

</head>

<body>

<div>

    <div class="logo">

        🏠 Property Rental Management

    </div>

    <div class="container">

        <!-- LOGIN -->

        <div class="card">

            <h2>Login</h2>

            <form action="/login"
                  method="post">

                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <button type="submit">

                    Login

                </button>

            </form>

        </div>

        <!-- REGISTER -->

        <div class="card">

            <h2>Register</h2>

            <form action="/register"
                  method="post">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <select name="role">

                    <option value="user">
                        User
                    </option>

                    <option value="admin">
                        Admin
                    </option>

                </select>

                <button type="submit">

                    Register

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
