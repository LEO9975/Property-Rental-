<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia Residences | Login & Registration</title>
    <!-- Google Fonts: Playfair Display & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #C5A880;
            --primary-gold-hover: #b3956d;
            --dark-obsidian: #090D16;
            --card-bg: rgba(15, 23, 42, 0.65);
            --border-gold: rgba(197, 168, 128, 0.3);
            --text-light: #F1EBE4;
            --text-muted: #A0AEC0;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(9, 13, 22, 0.7), rgba(9, 13, 22, 0.85)), 
                        url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?q=80&w=1600') no-repeat center center;
            background-size: cover;
            padding: 20px;
            color: var(--text-light);
            overflow-x: hidden;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-header {
            text-align: center;
        }

        .brand-logo {
            font-family: var(--font-serif);
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .brand-logo span {
            color: var(--primary-gold);
        }

        .brand-tagline {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary-gold);
            font-weight: 500;
        }

        .container {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-gold);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            gap: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Subtle divider in middle of forms */
        .container::before {
            content: '';
            position: absolute;
            top: 40px;
            bottom: 40px;
            left: 50%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border-gold), transparent);
            transform: translateX(-50%);
        }

        .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        h2 {
            font-family: var(--font-serif);
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-light);
            position: relative;
            padding-bottom: 10px;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 2px;
            background-color: var(--primary-gold);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 14px;
            font-weight: 400;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus,
        select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(197, 168, 128, 0.15);
        }

        select option {
            background-color: var(--dark-obsidian);
            color: var(--text-light);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-gold), #b59871);
            color: var(--dark-obsidian);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(197, 168, 128, 0.2);
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(135deg, var(--primary-gold-hover), #9d815d);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(197, 168, 128, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        /* Responsive changes */
        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                gap: 50px;
                padding: 30px;
            }

            .container::before {
                display: none;
            }

            .card {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <header class="brand-header">
        <div class="brand-logo">AURELIA <span>ESTATES</span></div>
        <div class="brand-tagline">Prestige Property Rentals</div>
    </header>

    <div class="container">
        <!-- LOGIN -->
        <div class="card">
            <h2>Sign In</h2>
            <form action="/login" method="post">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input 
                        type="email" 
                        id="login-email"
                        name="email" 
                        placeholder="name@example.com" 
                        required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input 
                        type="password" 
                        id="login-password"
                        name="password" 
                        placeholder="••••••••••••" 
                        required>
                </div>

                <button type="submit">
                    Enter Dashboard
                </button>
            </form>
        </div>

        <!-- REGISTER -->
        <div class="card">
            <h2>Create Account</h2>
            <form action="/register" method="post">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input 
                        type="text" 
                        id="reg-username"
                        name="username" 
                        placeholder="e.g. alex_stone" 
                        required>
                </div>

                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input 
                        type="email" 
                        id="reg-email"
                        name="email" 
                        placeholder="name@example.com" 
                        required>
                </div>

                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input 
                        type="password" 
                        id="reg-password"
                        name="password" 
                        placeholder="••••••••••••" 
                        required>
                </div>

                <div class="form-group">
                    <label for="reg-role">Account Type</label>
                    <select name="role" id="reg-role">
                        <option value="user">Private Client (Tenant)</option>
                        <option value="admin">Estate Manager (Admin)</option>
                    </select>
                </div>

                <button type="submit">
                    Register Account
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
